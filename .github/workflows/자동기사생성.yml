name: 매일 자동 기사 생성

on:
  schedule:
    # 매일 오전 6시 (KST) = UTC 21:00 전날
    - cron: '0 21 * * *'
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write   # articles.json push 권한

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install anthropic feedparser requests json-repair

      - name: 기사 자동 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python 기사자동생성.py

      - name: 기사 검수 (사실성 + 이미지)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python 기사검수.py

      - name: 변경사항 GitHub에 저장
        run: |
          git config user.name "소재경제신문 봇"
          git config user.email "bot@materials-press.co.kr"
          git add articles.json images/ archive/
          git commit -m "자동 기사 업데이트 $(date +'%Y-%m-%d %H:%M')" || echo "변경사항 없음"
          git push
